services:

  # ── Aplicação Django + Gunicorn ───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cmm-app
    restart: unless-stopped
    env_file: .env
    environment:
      SESSION_FILE_PATH: /app/.sessions
    volumes:
      - cmm_sessions:/app/.sessions
      - cmm_static:/app/staticfiles
    expose:
      - "8000"
    networks:
      - cmm_net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Nginx — proxy reverso + arquivos estáticos ────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: cmm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - cmm_static:/app/staticfiles:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - cmm_net

volumes:
  cmm_sessions:
    driver: local
  cmm_static:
    driver: local

networks:
  cmm_net:
    driver: bridge
